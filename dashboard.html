<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
    .summary { display: flex; justify-content: space-around; margin-bottom: 20px; }
    .summary div { border: 1px solid #ccc; padding: 15px; border-radius: 5px; text-align: center; }
    canvas { margin-top: 30px; }
    button { margin-top: 20px; padding: 10px; font-size: 16px; width: 100%; }
  </style>
</head>
<body>
  <h2>Shop Dashboard</h2>

  <div class="summary">
    <div>
      <h3>Total Sales</h3>
      <p id="totalSales">0</p>
    </div>
    <div>
      <h3>Total Revenue</h3>
      <p id="totalRevenue">0</p>
    </div>
    <div>
      <h3>Total Profit</h3>
      <p id="totalProfit">0</p>
    </div>
  </div>

  <canvas id="salesChart" width="400" height="200"></canvas>

  <button id="goToSales">Record More Sales</button>
  <button id="goToProducts">Add More Products</button>

  <script>
    const shop_id = localStorage.getItem("shop_id");
    if (!shop_id) {
      alert("No shop logged in.");
      window.location.href = "/login.html";
    }

    const totalSalesEl = document.getElementById("totalSales");
    const totalRevenueEl = document.getElementById("totalRevenue");
    const totalProfitEl = document.getElementById("totalProfit");
    const ctx = document.getElementById("salesChart").getContext("2d");

    let chart;

    // Fetch dashboard totals
    async function loadDashboard() {
      try {
        const res = await fetch(`/dashboard/${shop_id}`);
        const data = await res.json();
        totalSalesEl.textContent = data.total_sales || 0;
        totalRevenueEl.textContent = data.total_revenue?.toFixed(2) || 0;
        totalProfitEl.textContent = data.total_profit?.toFixed(2) || 0;
      } catch (err) {
        console.error("Dashboard totals error:", err);
      }
    }

    // Fetch sales data for chart
    async function loadSalesChart() {
      try {
        const res = await fetch(`/sales/${shop_id}`);
        const sales = await res.json();

        // Prepare data for chart
        const labels = sales.map(s => new Date(s.created_at).toLocaleDateString());
        const revenueData = sales.map(s => s.total);
        const profitData = sales.map(s => s.profit);

        if (chart) chart.destroy(); // Reset chart if exists

        chart = new Chart(ctx, {
          type: "line",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Revenue",
                data: revenueData,
                borderColor: "green",
                fill: false
              },
              {
                label: "Profit",
                data: profitData,
                borderColor: "blue",
                fill: false
              }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: "top" }
            },
            scales: {
              x: { title: { display: true, text: "Date" } },
              y: { title: { display: true, text: "Amount" } }
            }
          }
        });
      } catch (err) {
        console.error("Sales chart error:", err);
      }
    }

    loadDashboard();
    loadSalesChart();

    document.getElementById("goToSales").addEventListener("click", () => {
      window.location.href = "/sales.html";
    });

    document.getElementById("goToProducts").addEventListener("click", () => {
      window.location.href = "/products.html";
    });
  </script>
</body>
</html>
