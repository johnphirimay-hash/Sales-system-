<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Record Sale</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: auto; padding: 20px; }
    input, select, button { display: block; width: 100%; margin: 10px 0; padding: 10px; font-size: 16px; }
    #salesList { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
    #salesList li { margin: 5px 0; }
  </style>
</head>
<body>
  <h2>Record Sale</h2>

  <form id="salesForm">
    <select id="productSelect" required>
      <option value="">Select Product</option>
    </select>
    <input type="number" id="quantity" placeholder="Quantity Sold" required>
    <input type="number" id="price" placeholder="Selling Price per Unit" required>
    <input type="text" id="totalSale" placeholder="Total Sale" readonly>
    <input type="text" id="profit" placeholder="Profit" readonly>
    <button type="submit">Record Sale</button>
  </form>

  <ul id="salesList"></ul>

  <button id="goToDashboard">View Dashboard</button>
  <button id="goToProducts">Add More Products</button>

  <script>
    const shop_id = localStorage.getItem("shop_id");
    if (!shop_id) {
      alert("No shop logged in.");
      window.location.href = "/login.html";
    }

    const productSelect = document.getElementById("productSelect");
    const quantityInput = document.getElementById("quantity");
    const priceInput = document.getElementById("price");
    const totalSaleInput = document.getElementById("totalSale");
    const profitInput = document.getElementById("profit");
    const salesList = document.getElementById("salesList");

    // Fetch products for this shop
    async function loadProducts() {
      try {
        const res = await fetch(`/shop-products/${shop_id}`);
        const products = await res.json();
        productSelect.innerHTML = '<option value="">Select Product</option>';
        products.forEach(p => {
          const option = document.createElement("option");
          option.value = p.id;
          option.textContent = `${p.product_name} (Cost: ${p.total_cost})`;
          option.dataset.cost = p.total_cost;
          productSelect.appendChild(option);
        });
      } catch (err) {
        console.error("Error loading products:", err);
        alert("Could not load products");
      }
    }

    loadProducts();

    // Calculate total sale & profit
    function calculateTotals() {
      const qty = Number(quantityInput.value);
      const price = Number(priceInput.value);
      const cost = Number(productSelect.selectedOptions[0]?.dataset.cost || 0);

      if (!isNaN(qty) && !isNaN(price)) {
        const totalSale = qty * price;
        totalSaleInput.value = totalSale.toFixed(2);
        // For profit, we calculate: ((price per unit - cost per unit) * qty)
        const costPerUnit = cost / qty || 0;
        const profit = (price - costPerUnit) * qty;
        profitInput.value = profit.toFixed(2);
      }
    }

    quantityInput.addEventListener("input", calculateTotals);
    priceInput.addEventListener("input", calculateTotals);
    productSelect.addEventListener("change", calculateTotals);

    // Handle form submit
    const form = document.getElementById("salesForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const product_id = productSelect.value;
      const productName = productSelect.selectedOptions[0]?.textContent.split(" (")[0];
      const quantity = Number(quantityInput.value);
      const price = Number(priceInput.value);
      const total = Number(totalSaleInput.value);
      const profit = Number(profitInput.value);

      if (!product_id || quantity <= 0 || price <= 0) {
        alert("Please fill in all fields correctly");
        return;
      }

      try {
        const res = await fetch("/record-sale", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ shop_id, product_id, product_name: productName, quantity, price, total, profit })
        });
        const data = await res.json();
        if (data.message) {
          alert("Sale recorded successfully!");
          const li = document.createElement("li");
          li.textContent = `${productName} - Qty: ${quantity} - Total: ${total} - Profit: ${profit}`;
          salesList.appendChild(li);
          form.reset();
          calculateTotals();
        } else {
          alert(data.error || "Failed to record sale");
        }
      } catch (err) {
        console.error("Error recording sale:", err);
        alert("Something went wrong.");
      }
    });

    document.getElementById("goToDashboard").addEventListener("click", () => {
      window.location.href = "/dashboard.html";
    });

    document.getElementById("goToProducts").addEventListener("click", () => {
      window.location.href = "/products.html";
    });
  </script>
</body>
</html>
