<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: auto; padding: 20px; }
    h2 { text-align: center; }
    input, button { margin: 10px 0; padding: 10px; width: 100%; font-size: 16px; }
  </style>
</head>
<body>

  <h2>Shop Login</h2>

  <form id="loginForm">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <button id="goToRegister">Register</button>

  <script>
    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.querySelector("[name='email']").value;
      const password = document.querySelector("[name='password']").value;

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.shop_id) {
          localStorage.setItem("shop_id", data.shop_id);
          window.location.href = "/products.html"; // redirect to products page after login
        } else {
          alert(data.error || "Login failed");
        }
      } catch (err) {
        console.error("Login error:", err);
        alert("Something went wrong.");
      }
    });

    document.getElementById("goToRegister").addEventListener("click", () => {
      window.location.href = "/register.html";
    });
  </script>

</body>
</html>
